server {
    listen 80;
    server_name skumyol.com;

    # IMPORTANT: Include mime.types to fix "Refused to execute" errors
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Next.js static assets - serve with proper caching and MIME types
    location /vine/_next/static/ {
        proxy_pass http://127.0.0.1:3001/vine/_next/static/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache static assets for 1 year (Next.js uses content hashing)
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API - note: trailing slash strips /vine/api/ prefix
    location /vine/api/ {
        proxy_pass http://127.0.0.1:8002/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Frontend - preserve the /vine prefix for Next.js basePath
    location /vine/ {
        proxy_pass http://127.0.0.1:3001/vine/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
