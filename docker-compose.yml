services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
    ports:
      - "8002:8000"
    volumes:
      - ./data:/app/data
    environment:
      APP_ENV: production
      API_BASE_URL: http://localhost:8002
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    mem_limit: 4g
    shm_size: 1g

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      network: host
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /vine/api
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
