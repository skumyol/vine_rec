services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
    container_name: vine-backend
    network_mode: host
    ports:
      - "8002:8000"
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    volumes:
      - ./data:/app/data
    environment:
      APP_ENV: production
      API_BASE_URL: http://localhost:8002
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    mem_limit: 4g
    shm_size: 1g
    extra_hosts:
      - "www.bing.com:13.107.42.14"
      - "serpapi.com:104.20.28.34"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      network: host
      args:
        - NEXT_PUBLIC_API_URL=/vine/api
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /vine/api
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
